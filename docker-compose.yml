services:
  app:
    build:
      context: .
    container_name: strawdmin
    ports:
      - "3000:3000"
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - JWT_SECRET=${JWT_SECRET}
      - SECURE_COOKIES=${SECURE_COOKIES}
      - BASE_PATH=${BASE_PATH:-}
    volumes:
      # Persistent data directory — REQUIRED to survive container restarts and upgrades.
      # Contains:
      #   app.db          — internal SQLite database (users, FK display settings,
      #                     field encryption settings, column view preferences)
      #   backups/        — JSON backup files created from the Backups page
      - ./data:/app/data
    restart: unless-stopped

# ── Sub-path deployment ────────────────────────────────────────────────────────
# To serve behind a reverse proxy at a sub-path, set BASE_PATH in your .env
# (no image rebuild needed):
#   BASE_PATH=/services/strawdmin   (in .env)
#   docker compose up
#
# The reverse proxy MUST strip the prefix before forwarding. Two location
# blocks are required — note trailing slashes on both location + proxy_pass:
#
#   # App pages AND public files (logo.svg, favicon.ico, etc.)
#   location /services/strawdmin/ {
#       proxy_pass http://strawdmin:3000/;
#       proxy_set_header Host $http_host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#       absolute_redirect off;
#   }
#   # Next.js built assets (no prefix in the URLs Next.js emits)
#   location /_next/ {
#       proxy_pass http://strawdmin:3000/_next/;
#       proxy_set_header Host $http_host;
#   }

