services:
  app:
    build:
      context: .
      args:
        BASE_PATH: ${BASE_PATH:-}
    container_name: strawdmin
    ports:
      - "3000:3000"
    environment:
      - DB_TYPE=${DB_TYPE}
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - JWT_SECRET=${JWT_SECRET}
      - SECURE_COOKIES=${SECURE_COOKIES}
      - BASE_PATH=${BASE_PATH:-}
    volumes:
      # Persistent data directory — REQUIRED to survive container restarts and upgrades.
      # Contains:
      #   app.db          — internal SQLite database (users, FK display settings,
      #                     field encryption settings, column view preferences)
      #   backups/        — JSON backup files created from the Backups page
      - ./data:/app/data
    restart: unless-stopped

# ── Sub-path deployment ────────────────────────────────────────────────────────
# To serve behind a reverse proxy at a sub-path, set BASE_PATH in your .env
# and rebuild the image:
#   BASE_PATH=/services/strawdmin   (in .env)
#   docker compose up --build
#
# Nginx location block:
#   location /services/strawdmin {
#       proxy_pass http://strawdmin:3000;
#       proxy_set_header Host $host;
#       proxy_set_header X-Real-IP $remote_addr;
#       proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
#       proxy_set_header X-Forwarded-Proto $scheme;
#   }

